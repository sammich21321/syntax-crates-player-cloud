services:
  - type: web
    name: syntax-crates-player-cloud
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cloud-server
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: player-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SYNTAX_CLOUD_STORE
        value: /var/data/cloud-players.json
